{% extends "base.html" %}

{% block title %}Confirm Delete{% endblock %}
{% block heading %}Confirm Delete{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <div class="alert alert-danger">
            <h3 class="alert-title">Are you sure?</h3>
            <p>You are about to delete <strong>{{ object }}</strong>. This action cannot be undone.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ cancel_url }}" class="btn">Cancel</a>
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
